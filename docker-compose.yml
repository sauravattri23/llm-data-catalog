version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.0
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow_user:airflow_pass@airflow_postgres/airflow_db
    AIRFLOW__CORE__FERNET_KEY: 'ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_-=CONFIG: 'true'
    DATABASE_URL: postgresql://catalog_user:catalog_pass@catalog_postgres/ecommerce_db
    NEO4J_URI: bolt://catalog_neo4j:7687
    NEO4J_USER: neo4j
    NEO4J_PASS: neo4j_pass
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./crawler:/opt/airflow/crawler
    - ./llm_engine:/opt/airflow/llm_engine
    - ./lineage:/opt/airflow/lineage
    - ./requirements-airflow.txt:/requirements-airflow.txt
    - airflow_logs:/opt/airflow/logs
  depends_on:
    airflow_postgres:
      condition: service_healthy

services:

  catalog_postgres:
    image: postgres:15
    container_name: catalog_postgres
    restart: always
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow_postgres:
    image: postgres:15
    container_name: airflow_postgres
    restart: always
    environment:
      POSTGRES_USER: airflow_user
      POSTGRES_PASSWORD: airflow_pass
      POSTGRES_DB: airflow_db
    ports:
      - "5433:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow_user -d airflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: catalog_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@catalog.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      catalog_postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  catalog_neo4j:
    image: neo4j:5.13
    container_name: catalog_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/neo4j_pass
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  airflow_init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@catalog.com \
          --password admin123
    restart: on-failure

  airflow_webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    restart: always
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow_scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    restart: always
    command: scheduler
    depends_on:
      airflow_init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  airflow_postgres_data:
  pgadmin_data:
  neo4j_data:
  airflow_logs: