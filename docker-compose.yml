version: "3.9"

services:

  # ─────────────────────────────────────────
  #  PostgreSQL — Main Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: catalog_postgres
    restart: always
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  #  pgAdmin — Visual DB Browser
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: catalog_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@catalog.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ─────────────────────────────────────────
  #  Neo4j — Graph Database for Lineage
  # ─────────────────────────────────────────
  neo4j:
    image: neo4j:5.13
    container_name: catalog_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/neo4j_pass
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"    # Neo4j Browser UI
      - "7687:7687"    # Bolt driver connection
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  pgadmin_data:
  neo4j_data: